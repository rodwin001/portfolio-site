<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Container DevOps & Application Delivery">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071016"/>
      <stop offset="100%" stop-color="#0e1b24"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #f5f7fb; font-family: Arial, sans-serif; font-size: 30px; font-weight: 800; }
      .subtitle { fill: #a9b6c3; font-family: Arial, sans-serif; font-size: 16px; }
      .box { fill: #102231; stroke: #48d5ff; stroke-opacity: .6; stroke-width: 1.6; rx: 16; }
      .box2 { fill: #101c26; stroke: #7c5cff; stroke-opacity: .65; stroke-width: 1.4; rx: 14; }
      .box3 { fill: #101c26; stroke: #ffb454; stroke-opacity: .7; stroke-width: 1.4; rx: 14; }
      .label { fill: #f5f7fb; font-family: Arial, sans-serif; font-size: 18px; font-weight: 800; }
      .small { fill: #a9b6c3; font-family: Arial, sans-serif; font-size: 14px; }
      .line { stroke: #48d5ff; stroke-opacity: .5; stroke-width: 2.2; fill: none; }
      .dash { stroke: #ffb454; stroke-opacity: .55; stroke-width: 2; stroke-dasharray: 8 7; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" rx="24"/>
  <text class="title" x="60" y="58">Container DevOps & Application Delivery</text>
  <text class="subtitle" x="60" y="86">Container delivery workflow from code to image build, registry, pipeline, and deployment.</text>

  <rect class="box" x="380" y="125" width="440" height="82" rx="16"/>
  <text class="label" x="500" y="158">Application Source Code</text>
  <text class="small" x="455" y="183">Starting point for the documented workflow</text>

  <path class="line" d="M600 207 V250"/>
  <path class="line" d="M190 250 H1010"/>
  <path class="line" d="M190 250 V295"/>
  <path class="line" d="M460 250 V295"/>
  <path class="line" d="M740 250 V295"/>
  <path class="line" d="M1010 250 V295"/>

  <rect class="box2" x="70" y="295" width="240" height="120" rx="14"/>
  <text class="label" x="115" y="335">Docker Build</text>
  <text class="small" x="105" y="365">Service / platform layer</text>

  <rect class="box2" x="340" y="295" width="240" height="120" rx="14"/>
  <text class="label" x="385" y="335">Image Registry</text>
  <text class="small" x="375" y="365">Automation / control layer</text>

  <rect class="box2" x="620" y="295" width="240" height="120" rx="14"/>
  <text class="label" x="665" y="335">CI/CD Pipeline</text>
  <text class="small" x="655" y="365">Validation / visibility layer</text>

  <rect class="box2" x="890" y="295" width="240" height="120" rx="14"/>
  <text class="label" x="930" y="335">Deployment Target</text>
  <text class="small" x="925" y="365">Operational result</text>

  <path class="line" d="M600 435 V475"/>
  <rect class="box3" x="220" y="475" width="760" height="90" rx="14"/>
  <text class="label" x="455" y="510">Operational Workflow</text>
  <text class="small" x="315" y="540">Review • Implement • Validate • Monitor • Document • Improve</text>

  <path class="line" d="M600 565 V600"/>
  <rect class="box" x="300" y="600" width="600" height="78" rx="16"/>
  <text class="label" x="455" y="635">Container Delivery</text>
  <text class="small" x="400" y="660">Documented cloud engineering outcome</text>

  <path class="dash" d="M190 415 C190 525 330 545 420 600"/>
  <path class="dash" d="M1010 415 C1010 525 870 545 780 600"/>
</svg>
