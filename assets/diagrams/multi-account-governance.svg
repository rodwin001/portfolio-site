<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AWS Multi-Account Governance Architecture</title>
  <desc id="desc">Architecture diagram showing AWS Organizations, governance controls, shared services, security visibility, workload accounts, automation, monitoring, and review workflows.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071016"/>
      <stop offset="100%" stop-color="#0e1b24"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="1">
      <stop offset="0%" stop-color="#102231"/>
      <stop offset="100%" stop-color="#132b3a"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #f5f7fb; font-family: Arial, sans-serif; font-size: 30px; font-weight: 800; }
      .subtitle { fill: #a9b6c3; font-family: Arial, sans-serif; font-size: 16px; }
      .box { fill: url(#box); stroke: #48d5ff; stroke-opacity: .55; stroke-width: 1.4; rx: 16; }
      .box2 { fill: #101c26; stroke: #7c5cff; stroke-opacity: .55; stroke-width: 1.3; rx: 14; }
      .box3 { fill: #101c26; stroke: #ffb454; stroke-opacity: .6; stroke-width: 1.3; rx: 14; }
      .label { fill: #f5f7fb; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .small { fill: #a9b6c3; font-family: Arial, sans-serif; font-size: 13px; }
      .line { stroke: #48d5ff; stroke-opacity: .45; stroke-width: 2; fill: none; }
      .dash { stroke: #ffb454; stroke-opacity: .55; stroke-width: 2; stroke-dasharray: 8 7; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="24"/>

  <text class="title" x="60" y="58">AWS Multi-Account Governance Architecture</text>
  <text class="subtitle" x="60" y="86">Public portfolio diagram showing governance, security visibility, shared services, workload accounts, and automation flow.</text>

  <rect class="box" x="410" y="120" width="380" height="80" rx="16"/>
  <text class="label" x="485" y="153">AWS Organization</text>
  <text class="small" x="477" y="178">Central account structure and governance boundary</text>

  <path class="line" d="M600 200 V245"/>
  <path class="line" d="M190 245 H1010"/>
  <path class="line" d="M190 245 V280"/>
  <path class="line" d="M460 245 V280"/>
  <path class="line" d="M740 245 V280"/>
  <path class="line" d="M1010 245 V280"/>

  <rect class="box2" x="70" y="280" width="240" height="120" rx="14"/>
  <text class="label" x="116" y="315">Management</text>
  <text class="small" x="105" y="342">Organizations</text>
  <text class="small" x="105" y="363">Control Tower patterns</text>
  <text class="small" x="105" y="384">SCP guardrails</text>

  <rect class="box2" x="340" y="280" width="240" height="120" rx="14"/>
  <text class="label" x="396" y="315">Security / Audit</text>
  <text class="small" x="376" y="342">Security Hub</text>
  <text class="small" x="376" y="363">AWS Config</text>
  <text class="small" x="376" y="384">CloudTrail visibility</text>

  <rect class="box2" x="620" y="280" width="240" height="120" rx="14"/>
  <text class="label" x="675" y="315">Shared Services</text>
  <text class="small" x="653" y="342">Route 53 / DNS</text>
  <text class="small" x="653" y="363">Logging support</text>
  <text class="small" x="653" y="384">Platform automation</text>

  <rect class="box2" x="890" y="280" width="240" height="120" rx="14"/>
  <text class="label" x="955" y="315">Workloads</text>
  <text class="small" x="925" y="342">Development</text>
  <text class="small" x="925" y="363">Test / QA</text>
  <text class="small" x="925" y="384">Production</text>

  <path class="line" d="M600 420 V455"/>
  <rect class="box3" x="190" y="455" width="820" height="95" rx="14"/>
  <text class="label" x="445" y="490">Baseline Deployment and Account Standardization</text>
  <text class="small" x="340" y="520">CloudFormation StackSets • AWS CLI • IAM baselines • logging controls • monitoring configuration</text>

  <path class="line" d="M600 550 V585"/>
  <rect class="box" x="250" y="585" width="700" height="95" rx="16"/>
  <text class="label" x="450" y="620">Governance Review and Remediation Flow</text>
  <text class="small" x="332" y="650">Security findings • ownership gaps • stale resources • cost visibility • operational follow-up</text>

  <path class="dash" d="M460 400 C460 445 520 445 520 455"/>
  <path class="dash" d="M740 400 C740 445 680 445 680 455"/>
  <path class="dash" d="M1010 400 C1010 525 865 535 815 585"/>
  <path class="dash" d="M190 400 C190 525 330 535 385 585"/>
</svg>
